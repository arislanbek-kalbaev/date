<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ответы</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5efe6;
      --bg-2: #efe5d8;
      --panel: rgba(255, 252, 247, 0.9);
      --ink: #1f1712;
      --muted: #6c5c52;
      --accent: #9c5f2f;
      --border: rgba(47, 25, 12, 0.12);
      --shadow: 0 22px 70px rgba(77, 54, 31, 0.15);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      color: var(--ink);
    }

    .shell {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 2.8rem);
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0 0 32px;
      color: var(--muted);
      font-size: 1rem;
    }

    .response-card {
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: var(--shadow);
      border-radius: 22px;
      padding: 24px 28px;
      margin-bottom: 20px;
    }

    .response-name {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 4px;
    }

    .response-time {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    .response-message {
      font-size: 1.05rem;
      line-height: 1.6;
      margin: 0 0 18px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(156, 95, 47, 0.08);
    }

    .activities-label {
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .activity-item {
      padding: 10px 14px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid var(--border);
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    .empty {
      padding: 28px;
      border-radius: 18px;
      border: 1px dashed var(--border);
      color: var(--muted);
      text-align: center;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
    }

    .button {
      appearance: none;
      border: 1px solid var(--border);
      background: #fffdf8;
      color: var(--ink);
      border-radius: 999px;
      padding: 8px 16px;
      font: inherit;
      font-size: 0.9rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>Её ответ</h1>
    <p class="subtitle">Здесь появится то, что она выбрала и написала.</p>
    <div class="toolbar">
      <button class="button" id="refresh">Обновить</button>
    </div>
    <div id="responses"></div>
  </div>

  <script>
    const responsesEl = document.getElementById('responses');

    const escapeHtml = (value) => String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');

    const formatTime = (value) => {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return date.toLocaleString();
    };

    const renderResponses = (responses) => {
      if (!responses.length) {
        responsesEl.innerHTML = '<div class="empty">Пока нет ответов. Как только она отправит выбор, он появится здесь.</div>';
        return;
      }

      responsesEl.innerHTML = responses.map((response) => {
        const details = Array.isArray(response.details) && response.details.length
          ? response.details
          : (Array.isArray(response.activities) ? response.activities : []);

        const activitiesHtml = details.length
          ? `
            <div class="activities-label">Выбрала</div>
            ${details.map((item) => `<div class="activity-item">${escapeHtml(item)}</div>`).join('')}
          `
          : '<div class="activities-label">Ничего не выбрала</div>';

        const messageHtml = response.message
          ? `<p class="response-message">${escapeHtml(response.message)}</p>`
          : '';

        return `
          <div class="response-card">
            <div class="response-name">${escapeHtml(response.name || 'Без имени')}</div>
            <div class="response-time">${escapeHtml(formatTime(response.received_at))}</div>
            ${messageHtml}
            ${activitiesHtml}
          </div>
        `;
      }).join('');
    };

    async function loadResponses() {
      const res = await fetch('/api/responses', { headers: { accept: 'application/json' } });
      const data = await res.json();
      renderResponses(data.responses || []);
    }

    document.getElementById('refresh').addEventListener('click', loadResponses);

    loadResponses().catch((error) => {
      responsesEl.innerHTML = `<div class="empty">Не удалось загрузить ответы: ${escapeHtml(error.message || String(error))}</div>`;
    });
  </script>
</body>
</html>
