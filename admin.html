<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Админ-панель</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5efe6;
      --bg-2: #efe5d8;
      --panel: rgba(255, 252, 247, 0.9);
      --ink: #1f1712;
      --muted: #6c5c52;
      --accent: #9c5f2f;
      --border: rgba(47, 25, 12, 0.12);
      --shadow: 0 22px 70px rgba(77, 54, 31, 0.15);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      color: var(--ink);
    }

    .shell {
      max-width: 920px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 2.8rem);
      letter-spacing: -0.02em;
    }

    h2 {
      font-size: 1.4rem;
      margin: 48px 0 8px;
    }

    .subtitle {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 1rem;
    }

    .response-card, .activity-row, .add-activity-card {
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: var(--shadow);
      border-radius: 22px;
      padding: 24px 28px;
      margin-bottom: 20px;
    }

    .response-name {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 4px;
    }

    .response-time, .response-meta {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .response-meta { margin-bottom: 16px; }

    .response-message {
      font-size: 1.05rem;
      line-height: 1.6;
      margin: 0 0 18px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(156, 95, 47, 0.08);
    }

    .activities-label {
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .activity-item {
      padding: 10px 14px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid var(--border);
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    .empty {
      padding: 28px;
      border-radius: 18px;
      border: 1px dashed var(--border);
      color: var(--muted);
      text-align: center;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 20px;
    }

    .button {
      appearance: none;
      border: 1px solid var(--border);
      background: #fffdf8;
      color: var(--ink);
      border-radius: 999px;
      padding: 8px 16px;
      font: inherit;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .button.danger {
      color: #9c2f2f;
      border-color: rgba(156, 47, 47, 0.3);
    }

    .activity-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
    }

    .activity-thumb {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      object-fit: cover;
      flex-shrink: 0;
      background: #fff;
    }

    .activity-name {
      flex: 1;
      font-size: 1.1rem;
    }

    .add-activity-card form {
      display: grid;
      gap: 14px;
    }

    label.field {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
    }

    input[type="text"], input[type="file"] {
      margin-top: 4px;
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      padding: 10px 12px;
      font: inherit;
    }

    .form-error {
      color: #9c2f2f;
      font-size: 0.85rem;
      display: none;
    }

    .field-hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin: 2px 0 0;
    }

    .crop-hint {
      font-size: 0.82rem;
      color: var(--muted);
      margin: 0 0 8px;
    }

    .crop-viewport {
      width: 100%;
      max-width: 480px;
      height: 360px;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      background: #111;
      border: 1px solid var(--border);
      touch-action: none;
      cursor: grab;
    }

    .crop-viewport img {
      position: absolute;
      left: 0;
      top: 0;
      user-select: none;
      pointer-events: none;
    }

    input[type="range"] {
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>Админ-панель</h1>
    <p class="subtitle">Ответы и варианты для свидания.</p>

    <h2>Её ответы</h2>
    <div class="toolbar">
      <button class="button" id="refresh-responses">Обновить</button>
    </div>
    <div id="responses"></div>

    <h2>Варианты для свидания</h2>
    <div class="toolbar">
      <button class="button" id="refresh-activities">Обновить</button>
    </div>
    <div id="activities"></div>

    <div class="add-activity-card">
      <div class="activities-label">Добавить вариант</div>
      <form id="add-activity-form">
        <label class="field">
          Название
          <input type="text" id="activity-name" maxlength="200" required />
        </label>
        <label class="field">
          Фото
          <input type="file" id="activity-image" accept="image/*" required />
        </label>
        <p class="field-hint">Фото должно быть горизонтальным, не менее 800×600.</p>
        <div id="cropper-section" style="display:none;">
          <div class="crop-hint">Перетащи фото и настрой масштаб, чтобы выбрать кадр.</div>
          <div class="crop-viewport" id="crop-viewport">
            <img id="crop-image" alt="" draggable="false" />
          </div>
          <input type="range" id="crop-zoom" min="1" max="3" step="0.01" value="1" />
        </div>
        <p class="form-error" id="add-activity-error"></p>
        <button type="submit" class="button">Добавить</button>
      </form>
    </div>
  </div>

  <script>
    const escapeHtml = (value) => String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');

    const formatTime = (value) => {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return date.toLocaleString();
    };

    function getAdminToken() {
      let token = localStorage.getItem('adminToken');
      if (!token) {
        token = prompt('Введите токен администратора (нужен для добавления/удаления вариантов):') || '';
        if (token) localStorage.setItem('adminToken', token);
      }
      return token;
    }

    // --- Responses ---

    const responsesEl = document.getElementById('responses');

    const renderResponses = (responses) => {
      if (!responses.length) {
        responsesEl.innerHTML = '<div class="empty">Пока нет ответов. Как только она отправит выбор, он появится здесь.</div>';
        return;
      }

      responsesEl.innerHTML = responses.map((response) => {
        const activities = Array.isArray(response.activities) ? response.activities : [];
        const activitiesHtml = activities.length
          ? `
            <div class="activities-label">Выбрала</div>
            ${activities.map((item) => `<div class="activity-item">${escapeHtml(item)}</div>`).join('')}
          `
          : '<div class="activities-label">Ничего не выбрала</div>';

        const messageHtml = response.message
          ? `<p class="response-message">${escapeHtml(response.message)}</p>`
          : '';

        const meetingHtml = (response.date || response.time)
          ? `<div class="response-meta">Дата и время: ${escapeHtml(response.date || '—')} ${escapeHtml(response.time || '')}</div>`
          : '';

        return `
          <div class="response-card">
            <div class="response-name">${escapeHtml(response.name || 'Без имени')}</div>
            <div class="response-time">${escapeHtml(formatTime(response.submitted_at))}</div>
            ${meetingHtml}
            ${messageHtml}
            ${activitiesHtml}
          </div>
        `;
      }).join('');
    };

    async function loadResponses() {
      const res = await fetch('/api/responses', { headers: { accept: 'application/json' } });
      const data = await res.json();
      renderResponses(data.responses || []);
    }

    document.getElementById('refresh-responses').addEventListener('click', loadResponses);

    loadResponses().catch((error) => {
      responsesEl.innerHTML = `<div class="empty">Не удалось загрузить ответы: ${escapeHtml(error.message || String(error))}</div>`;
    });

    // --- Activities ---

    const activitiesEl = document.getElementById('activities');

    const renderActivities = (activities) => {
      if (!activities.length) {
        activitiesEl.innerHTML = '<div class="empty">Пока нет вариантов. Добавь первый ниже.</div>';
        return;
      }

      activitiesEl.innerHTML = activities.map((activity) => `
        <div class="activity-row">
          <img class="activity-thumb" src="${escapeHtml(activity.image_url)}" alt="" />
          <div class="activity-name">${escapeHtml(activity.name)}</div>
          <button class="button danger" data-delete-id="${escapeHtml(activity.id)}">Удалить</button>
        </div>
      `).join('');

      activitiesEl.querySelectorAll('[data-delete-id]').forEach((button) => {
        button.addEventListener('click', () => deleteActivity(button.dataset.deleteId));
      });
    };

    async function loadActivities() {
      const res = await fetch('/api/activities', { headers: { accept: 'application/json' } });
      const data = await res.json();
      renderActivities(data.activities || []);
    }

    async function deleteActivity(id) {
      if (!confirm('Удалить этот вариант?')) return;
      const token = getAdminToken();
      const res = await fetch(`/api/activities/${encodeURIComponent(id)}`, {
        method: 'DELETE',
        headers: { 'x-admin-token': token },
      });
      if (res.status === 401) {
        localStorage.removeItem('adminToken');
        alert('Неверный токен администратора.');
        return;
      }
      await loadActivities();
    }

    document.getElementById('refresh-activities').addEventListener('click', loadActivities);

    loadActivities().catch((error) => {
      activitiesEl.innerHTML = `<div class="empty">Не удалось загрузить варианты: ${escapeHtml(error.message || String(error))}</div>`;
    });

    const addForm = document.getElementById('add-activity-form');
    const addError = document.getElementById('add-activity-error');
    const fileInput = document.getElementById('activity-image');
    const cropperSection = document.getElementById('cropper-section');
    const cropViewport = document.getElementById('crop-viewport');
    const cropImage = document.getElementById('crop-image');
    const zoomSlider = document.getElementById('crop-zoom');

    // Standard horizontal crop: 4:3, matching the card image on the invite page.
    const CROP_VIEW_W = 480;
    const CROP_VIEW_H = 360;
    const CROP_OUTPUT_W = 1200;
    const CROP_OUTPUT_H = 900;

    let cropState = null;

    const clampCropOffset = (state) => {
      const displayedW = state.naturalWidth * state.baseScale * state.zoom;
      const displayedH = state.naturalHeight * state.baseScale * state.zoom;
      state.left = Math.min(0, Math.max(CROP_VIEW_W - displayedW, state.left));
      state.top = Math.min(0, Math.max(CROP_VIEW_H - displayedH, state.top));
    };

    const applyCropTransform = () => {
      if (!cropState) return;
      const displayedW = cropState.naturalWidth * cropState.baseScale * cropState.zoom;
      const displayedH = cropState.naturalHeight * cropState.baseScale * cropState.zoom;
      cropImage.style.width = `${displayedW}px`;
      cropImage.style.height = `${displayedH}px`;
      cropImage.style.left = `${cropState.left}px`;
      cropImage.style.top = `${cropState.top}px`;
    };

    fileInput.addEventListener('change', () => {
      addError.style.display = 'none';
      cropperSection.style.display = 'none';
      cropState = null;
      const file = fileInput.files[0];
      if (!file) return;

      const img = new Image();
      img.onload = () => {
        if (img.naturalWidth <= img.naturalHeight) {
          addError.textContent = 'Изображение должно быть горизонтальным (шире, чем выше).';
          addError.style.display = 'block';
          fileInput.value = '';
          return;
        }
        if (img.naturalWidth < 800 || img.naturalHeight < 600) {
          addError.textContent = 'Фото слишком маленькое. Нужно минимум 800×600.';
          addError.style.display = 'block';
          fileInput.value = '';
          return;
        }
        const baseScale = Math.max(CROP_VIEW_W / img.naturalWidth, CROP_VIEW_H / img.naturalHeight);
        cropState = {
          naturalWidth: img.naturalWidth,
          naturalHeight: img.naturalHeight,
          baseScale,
          zoom: 1,
          left: 0,
          top: 0,
        };
        clampCropOffset(cropState);
        cropImage.src = img.src;
        zoomSlider.value = '1';
        cropperSection.style.display = 'block';
        applyCropTransform();
      };
      img.onerror = () => {
        addError.textContent = 'Не удалось прочитать файл изображения.';
        addError.style.display = 'block';
      };
      img.src = URL.createObjectURL(file);
    });

    zoomSlider.addEventListener('input', () => {
      if (!cropState) return;
      cropState.zoom = Number(zoomSlider.value);
      clampCropOffset(cropState);
      applyCropTransform();
    });

    let dragState = null;
    cropViewport.addEventListener('pointerdown', (event) => {
      if (!cropState) return;
      dragState = { startX: event.clientX, startY: event.clientY, left: cropState.left, top: cropState.top };
      cropViewport.setPointerCapture(event.pointerId);
    });
    cropViewport.addEventListener('pointermove', (event) => {
      if (!dragState || !cropState) return;
      cropState.left = dragState.left + (event.clientX - dragState.startX);
      cropState.top = dragState.top + (event.clientY - dragState.startY);
      clampCropOffset(cropState);
      applyCropTransform();
    });
    cropViewport.addEventListener('pointerup', () => { dragState = null; });
    cropViewport.addEventListener('pointercancel', () => { dragState = null; });

    function cropToBlob() {
      return new Promise((resolve, reject) => {
        if (!cropState) {
          reject(new Error('no_crop_state'));
          return;
        }
        const scaleFactor = cropState.baseScale * cropState.zoom;
        const sourceX = -cropState.left / scaleFactor;
        const sourceY = -cropState.top / scaleFactor;
        const sourceW = CROP_VIEW_W / scaleFactor;
        const sourceH = CROP_VIEW_H / scaleFactor;
        const canvas = document.createElement('canvas');
        canvas.width = CROP_OUTPUT_W;
        canvas.height = CROP_OUTPUT_H;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(cropImage, sourceX, sourceY, sourceW, sourceH, 0, 0, CROP_OUTPUT_W, CROP_OUTPUT_H);
        canvas.toBlob((blob) => {
          if (blob) resolve(blob); else reject(new Error('export_failed'));
        }, 'image/jpeg', 0.92);
      });
    }

    addForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      addError.style.display = 'none';

      const name = document.getElementById('activity-name').value.trim();
      if (!name || !cropState) {
        addError.textContent = 'Укажи название и выбери горизонтальное фото.';
        addError.style.display = 'block';
        return;
      }

      let blob;
      try {
        blob = await cropToBlob();
      } catch (error) {
        addError.textContent = 'Не получилось обработать фото.';
        addError.style.display = 'block';
        return;
      }

      const token = getAdminToken();
      const formData = new FormData();
      formData.append('name', name);
      formData.append('image', blob, 'activity.jpg');

      const res = await fetch('/api/activities', {
        method: 'POST',
        headers: { 'x-admin-token': token },
        body: formData,
      });

      if (res.status === 401) {
        localStorage.removeItem('adminToken');
        addError.textContent = 'Неверный токен администратора. Попробуй ещё раз.';
        addError.style.display = 'block';
        return;
      }
      if (!res.ok) {
        addError.textContent = 'Не получилось добавить вариант.';
        addError.style.display = 'block';
        return;
      }

      addForm.reset();
      cropperSection.style.display = 'none';
      cropState = null;
      await loadActivities();
    });
  </script>
</body>
</html>
