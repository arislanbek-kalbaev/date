<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Спасибо!</title>
  <link rel="stylesheet" href="css2" />
  <link rel="stylesheet" href="styles-BQKTOYHW.css" />
  <style>
    html, body { margin: 0; }
    .hero-video {
      max-width: 240px;
      width: 100%;
      border-radius: 1.5rem;
      box-shadow: var(--shadow-soft);
      margin: 0 auto 1.5rem;
      display: block;
    }
  </style>
</head>
<body>
  <div class="min-h-screen font-sans text-foreground">
    <header class="relative overflow-hidden min-h-screen flex items-center">
      <div aria-hidden="true" class="absolute inset-0 -z-10" style="background:#FFF4F2"></div>
      <div class="mx-auto max-w-2xl px-6 py-20 text-center">
        <video class="hero-video" autoplay muted loop playsinline preload="auto" aria-label="Nick and Judy laughing together">
          <source src="zootopia-laughing.webm" type="video/webm" />
          <source src="zootopia-laughing.mp4" type="video/mp4" />
        </video>
        <span class="inline-flex items-center gap-2 rounded-full bg-white/70 px-4 py-1.5 text-sm tracking-wide text-[color:var(--coral)] shadow-sm backdrop-blur">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-heart h-4 w-4 fill-[color:var(--coral)]" aria-hidden="true"><path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"></path></svg>
          Получено
        </span>
        <h1 class="mt-6 text-5xl leading-[1.05] sm:text-7xl" style="font-family:var(--font-display)" id="thanks-title">Спасибо!</h1>
        <p class="mx-auto mt-6 max-w-xl text-base text-muted-foreground sm:text-lg">Я получил твой ответ и уже считаю дни до встречи. Жду нашей встречи с нетерпением!</p>
        <div class="mt-8 inline-flex items-center gap-2 text-sm text-muted-foreground">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-sparkles h-4 w-4" aria-hidden="true"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"></path><path d="M20 2v4"></path><path d="M22 4h-4"></path><circle cx="4" cy="20" r="2"></circle></svg>
          До скорой встречи
        </div>
      </div>
    </header>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get('name');
    if (name) {
      document.getElementById('thanks-title').textContent = `Спасибо, ${name}!`;
    }
  </script>
</body>
</html>
