<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Гульхаё, у меня вопрос…</title>
  <link rel="stylesheet" href="css2" />
  <link rel="stylesheet" href="styles-BQKTOYHW.css" />
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; }
    .glow-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      background: color-mix(in oklab, var(--coral) 50%, transparent);
      animation: float-blob 9s ease-in-out infinite;
      z-index: -5;
    }
    .glow-blob.b1 { width: 260px; height: 260px; top: 8%; left: 8%; }
    .glow-blob.b2 { width: 220px; height: 220px; bottom: 10%; right: 10%; animation-delay: -3s; }
    .glow-blob.b3 { width: 180px; height: 180px; top: 55%; left: 70%; animation-delay: -6s; }
    @keyframes float-blob {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, -25px) scale(1.08); }
    }
    .hero-video {
      max-width: 280px;
      width: 100%;
      border-radius: 1.5rem;
      box-shadow: var(--shadow-soft);
    }
    .ask-buttons { position: relative; }
    .ask-btn {
      appearance: none;
      border: none;
      font: inherit;
      font-size: 1.05rem;
      font-weight: 600;
      padding: .9rem 2.2rem;
      border-radius: 999px;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    #yes-btn {
      background: var(--coral);
      color: #fff;
      box-shadow: var(--shadow-soft);
    }
    #yes-btn:hover { transform: scale(1.05); }
    #no-btn {
      background: var(--card);
      color: var(--foreground);
      border: 1px solid var(--border);
      transition: top .2s ease, left .2s ease;
    }
    #no-btn.is-fleeing { position: fixed; z-index: 20; }
  </style>
</head>
<body>
  <div class="min-h-screen font-sans text-foreground">
    <header class="relative overflow-hidden min-h-screen flex items-center">
      <div aria-hidden="true" class="absolute inset-0 -z-10" style="background:linear-gradient(135deg, #fff0f5, #ffe4e1)"></div>
      <img src="flowers-AbJLmTm8.jpg" alt="" width="1536" height="768" class="absolute inset-0 -z-10 h-full w-full object-cover opacity-40 mix-blend-multiply" />
      <div aria-hidden="true" class="glow-blob b1"></div>
      <div aria-hidden="true" class="glow-blob b2"></div>
      <div aria-hidden="true" class="glow-blob b3"></div>
      <div class="mx-auto max-w-2xl px-6 py-20 text-center">
        <video class="hero-video" autoplay muted loop playsinline preload="auto" aria-label="Nick and Judy driving together">
          <source src="zootopia-driving.webm" type="video/webm" />
          <source src="zootopia-driving.mp4" type="video/mp4" />
        </video>
        <h1 class="mt-6 text-4xl leading-[1.15] sm:text-5xl" style="font-family:var(--font-display)">Гульхаё, давай проведём время вместе?</h1>
        <div class="mt-10 flex items-center justify-center gap-4 ask-buttons">
          <button type="button" id="yes-btn" class="ask-btn">Да 💛</button>
          <button type="button" id="no-btn" class="ask-btn">Нет</button>
        </div>
      </div>
    </header>
  </div>

  <script>
    const noBtn = document.getElementById('no-btn');
    const yesBtn = document.getElementById('yes-btn');
    const margin = 16;

    function flee() {
      const rect = noBtn.getBoundingClientRect();
      const maxX = Math.max(margin, window.innerWidth - rect.width - margin);
      const maxY = Math.max(margin, window.innerHeight - rect.height - margin);
      const x = margin + Math.random() * (maxX - margin);
      const y = margin + Math.random() * (maxY - margin);
      noBtn.classList.add('is-fleeing');
      noBtn.style.left = `${x}px`;
      noBtn.style.top = `${y}px`;
    }

    noBtn.addEventListener('pointerenter', flee);
    noBtn.addEventListener('click', (event) => {
      event.preventDefault();
      flee();
    });
    window.addEventListener('resize', () => {
      if (noBtn.classList.contains('is-fleeing')) flee();
    });

    yesBtn.addEventListener('click', () => {
      window.location.href = 'date.html';
    });
  </script>
</body>
</html>
