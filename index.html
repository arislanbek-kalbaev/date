<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Гульхаё, у меня вопрос…</title>
  <link rel="stylesheet" href="css2" />
  <link rel="stylesheet" href="styles-BQKTOYHW.css" />
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .5s ease, transform .5s ease;
    }
    body.page-ready { opacity: 1; transform: translateY(0); }
    body.page-leaving {
      opacity: 0;
      transform: translateY(-10px);
      transition: opacity .35s ease, transform .35s ease;
    }
    .countdown-overlay {
      position: fixed;
      inset: 0;
      background: #FFF4F2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .75rem;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
    }
    .countdown-overlay.is-active { opacity: 1; pointer-events: all; }
    .countdown-number {
      font-family: var(--font-display);
      font-size: 9rem;
      line-height: 1;
      font-weight: 600;
      color: var(--coral);
      text-shadow: 0 8px 30px color-mix(in oklab, var(--coral) 35%, transparent);
    }
    .countdown-number.pop { animation: countdown-pop .7s cubic-bezier(.34, 1.56, .64, 1); }
    @keyframes countdown-pop {
      0% { transform: scale(.4); opacity: 0; }
      35% { transform: scale(1.15); opacity: 1; }
      60% { transform: scale(1); opacity: 1; }
      100% { transform: scale(.9); opacity: 1; }
    }
    .countdown-caption {
      font-size: 1.05rem;
      color: var(--muted-foreground);
    }
    .glow-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      background: color-mix(in oklab, var(--coral) 50%, transparent);
      animation: float-blob 9s ease-in-out infinite;
      z-index: -5;
    }
    .glow-blob.b1 { width: 260px; height: 260px; top: 8%; left: 8%; }
    .glow-blob.b2 { width: 220px; height: 220px; bottom: 10%; right: 10%; animation-delay: -3s; }
    .glow-blob.b3 { width: 180px; height: 180px; top: 55%; left: 70%; animation-delay: -6s; }
    @keyframes float-blob {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, -25px) scale(1.08); }
    }
    .hero-video {
      max-width: 280px;
      width: 100%;
      border-radius: 1.5rem;
      box-shadow: var(--shadow-soft);
    }
    .ask-buttons { position: relative; }
    .ask-btn {
      appearance: none;
      border: none;
      font: inherit;
      font-size: 1.05rem;
      font-weight: 600;
      padding: .9rem 2.2rem;
      border-radius: 999px;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    #yes-btn {
      background: var(--coral);
      color: #fff;
      box-shadow: var(--shadow-soft);
    }
    #yes-btn:hover { transform: scale(1.05); }
    #no-btn {
      background: var(--card);
      color: var(--foreground);
      border: 1px solid var(--border);
      transition: top .2s ease, left .2s ease;
    }
    #no-btn.is-fleeing { position: fixed; z-index: 20; }
  </style>
</head>
<body>
  <div class="min-h-screen font-sans text-foreground">
    <header class="relative overflow-hidden min-h-screen flex items-center">
      <div aria-hidden="true" class="absolute inset-0 -z-10" style="background:#FFF4F2"></div>
      <div aria-hidden="true" class="glow-blob b1"></div>
      <div aria-hidden="true" class="glow-blob b2"></div>
      <div aria-hidden="true" class="glow-blob b3"></div>
      <div class="mx-auto max-w-2xl px-6 py-20 text-center">
        <video class="hero-video" autoplay muted loop playsinline preload="auto" aria-label="Nick and Judy at the masquerade ball">
          <source src="zootopia-gala.webm" type="video/webm" />
          <source src="zootopia-gala.mp4" type="video/mp4" />
        </video>
        <h1 class="mt-6 text-4xl leading-[1.15] sm:text-5xl" style="font-family:var(--font-display)">Гульхаё, давай проведём время вместе?</h1>
        <div class="mt-10 flex items-center justify-center gap-4 ask-buttons">
          <button type="button" id="yes-btn" class="ask-btn">Да 💛</button>
          <button type="button" id="no-btn" class="ask-btn">Нет</button>
        </div>
      </div>
    </header>
  </div>

  <div class="countdown-overlay" id="countdown-overlay" aria-hidden="true">
    <div class="countdown-number" id="countdown-number">3</div>
    <p class="countdown-caption">Уже бегу к тебе…</p>
  </div>

  <script>
    requestAnimationFrame(() => document.body.classList.add('page-ready'));

    const noBtn = document.getElementById('no-btn');
    const yesBtn = document.getElementById('yes-btn');
    const countdownOverlay = document.getElementById('countdown-overlay');
    const countdownNumber = document.getElementById('countdown-number');
    const margin = 16;

    function flee() {
      const rect = noBtn.getBoundingClientRect();
      const maxX = Math.max(margin, window.innerWidth - rect.width - margin);
      const maxY = Math.max(margin, window.innerHeight - rect.height - margin);
      const hopMin = 90;
      const hopMax = 170;
      let x = rect.left;
      let y = rect.top;
      for (let attempt = 0; attempt < 8; attempt += 1) {
        const angle = Math.random() * Math.PI * 2;
        const distance = hopMin + Math.random() * (hopMax - hopMin);
        const candidateX = Math.min(maxX, Math.max(margin, rect.left + Math.cos(angle) * distance));
        const candidateY = Math.min(maxY, Math.max(margin, rect.top + Math.sin(angle) * distance));
        if (Math.hypot(candidateX - rect.left, candidateY - rect.top) > hopMin * 0.5) {
          x = candidateX;
          y = candidateY;
          break;
        }
      }
      noBtn.classList.add('is-fleeing');
      noBtn.style.left = `${x}px`;
      noBtn.style.top = `${y}px`;
    }

    noBtn.addEventListener('pointerenter', flee);
    noBtn.addEventListener('click', (event) => {
      event.preventDefault();
      flee();
    });
    window.addEventListener('resize', () => {
      if (noBtn.classList.contains('is-fleeing')) flee();
    });

    const playPop = () => {
      countdownNumber.classList.remove('pop');
      void countdownNumber.offsetWidth;
      countdownNumber.classList.add('pop');
    };

    yesBtn.addEventListener('click', () => {
      countdownOverlay.classList.add('is-active');
      let count = 3;
      countdownNumber.textContent = String(count);
      playPop();
      const tick = () => {
        count -= 1;
        if (count > 0) {
          countdownNumber.textContent = String(count);
          playPop();
          setTimeout(tick, 700);
        } else {
          document.body.classList.add('page-leaving');
          setTimeout(() => { window.location.href = 'date.html'; }, 280);
        }
      };
      setTimeout(tick, 700);
    });
  </script>
</body>
</html>
